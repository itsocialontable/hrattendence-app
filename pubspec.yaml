name: hrm_attendance_app
description: Modern HRM & Employee Attendance App with premium SaaS UI

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  intl: ^0.18.1

  provider: ^6.0.0
  http: ^1.1.0

  flutter_secure_storage: ^9.2.4
  local_auth: ^2.1.0
  shared_preferences: ^2.2.2

  syncfusion_flutter_pdfviewer: 23.1.44

  image_picker: ^1.0.7
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/pdf/